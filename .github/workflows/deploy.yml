name: Deploy

on:
  push:
    tags:
      - 'v*'

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          docker build -t $ECR_REGISTRY/avatar-backend:$IMAGE_TAG ./backend
          docker build -t $ECR_REGISTRY/avatar-backend:latest ./backend
          docker push $ECR_REGISTRY/avatar-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/avatar-backend:latest

      - name: Build and push frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          docker build -t $ECR_REGISTRY/avatar-frontend:$IMAGE_TAG ./frontend
          docker build -t $ECR_REGISTRY/avatar-frontend:latest ./frontend
          docker push $ECR_REGISTRY/avatar-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/avatar-frontend:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster avatar-cluster \
            --service avatar-backend \
            --force-new-deployment
          aws ecs update-service \
            --cluster avatar-cluster \
            --service avatar-frontend \
            --force-new-deployment
